<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SisAPEC-Work | Prontuário FHIR Completo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-4">
    <h2 class="text-center mb-4 text-primary">SisAPEC-Work: Interoperabilidade FHIR</h2>

    <ul class="nav nav-pills justify-content-center mb-4 bg-white p-2 rounded shadow-sm" id="mainNav">
        <li class="nav-item">
            <button class="nav-link active" onclick="alternarModulo('cadastro')">1. Cadastro de Pacientes</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="alternarModulo('anamnese')">2. Módulo de Anamnese</button>
        </li>
    </ul>

    <div id="modulo-cadastro">
        <div class="card border-primary shadow-sm mb-4">
            <div class="card-header bg-primary text-white">Configuração e Novo Paciente</div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">URL do Servidor HAPI-FHIR:</label>
                    <input type="text" class="form-control" id="serverUrl" value="http://localhost:8080/fhir">
                </div>
                <form id="formCadastro">
                    <input type="hidden" id="pacienteId">
                    <div class="row g-3">
                        <div class="col-md-6"><input type="text" id="inputNome" class="form-control" placeholder="Nome" required></div>
                        <div class="col-md-6"><input type="text" id="inputSobrenome" class="form-control" placeholder="Sobrenome" required></div>
                        <div class="col-12 text-end">
                            <button type="submit" class="btn btn-success">Salvar Paciente</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h5>Pacientes Cadastrados</h5>
                <table class="table table-hover">
                    <thead><tr><th>ID</th><th>Nome</th><th>Ações</th></tr></thead>
                    <tbody id="tabelaPacientes"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modulo-anamnese" style="display:none;">
        <div class="card border-info shadow-sm mb-4">
            <div class="card-header bg-info text-white">Anamnese de Promoção da Saúde</div>
            <div class="card-body">
                <div class="input-group mb-4">
                    <input type="text" id="idBuscaClinica" class="form-control" placeholder="ID do Paciente">
                    <button class="btn btn-dark" onclick="vincularPacienteClinico()">Vincular Paciente</button>
                </div>

                <div id="interfaceClinica" style="display:none;">
                    <div class="alert alert-info">Paciente: <strong id="nomePacienteClinico">---</strong></div>

                    <div class="accordion" id="accAnamnese">
                        <div class="accordion-item">
                            <h2 class="accordion-header"><button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#sec1">1. Queixa Principal e Satisfação</button></h2>
                            <div id="sec1" class="accordion-collapse collapse show" data-bs-parent="#accAnamnese">
                                <div class="accordion-body">
                                    <form id="formQueixa">
                                        <input type="hidden" id="queixaId">
                                        <textarea id="txtQueixa" class="form-control mb-2" placeholder="Qual sua queixa principal?" required></textarea>
                                        <select id="selSatisfacao" class="form-select mb-2">
                                            <option value="satisfied">Satisfeito</option>
                                            <option value="neutral">Neutro</option>
                                            <option value="dissatisfied">Insatisfeito</option>
                                        </select>
                                        <button type="submit" class="btn btn-primary btn-sm">Salvar Registro</button>
                                    </form>
                                    <div id="listQueixas" class="mt-2 small"></div>
                                </div>
                            </div>
                        </div>

                        <div class="accordion-item">
                            <h2 class="accordion-header"><button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#sec2">2. Internação</button></h2>
                            <div id="sec2" class="accordion-collapse collapse" data-bs-parent="#accAnamnese">
                                <div class="accordion-body">
                                    <form id="formInternacao">
                                        <input type="hidden" id="internacaoId">
                                        <div class="row g-2">
                                            <div class="col-md-6"><input type="date" id="dataInternacao" class="form-control"></div>
                                            <div class="col-md-6"><input type="text" id="motivoInternacao" class="form-control" placeholder="Por quê?"></div>
                                        </div>
                                        <button type="submit" class="btn btn-primary btn-sm mt-2">Registrar Internação</button>
                                    </form>
                                    <div id="listInternacoes" class="mt-2 small"></div>
                                </div>
                            </div>
                        </div>

                        <div class="accordion-item">
                            <h2 class="accordion-header"><button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#sec3">3. Acompanhamento de Saúde</button></h2>
                            <div id="sec3" class="accordion-collapse collapse" data-bs-parent="#accAnamnese">
                                <div class="accordion-body">
                                    <form id="formAcompanhamento">
                                        <input type="hidden" id="acompId">
                                        <select id="selAcomp" class="form-select mb-2"><option value="yes">Sim</option><option value="no">Não</option></select>
                                        <input type="text" id="localAcomp" class="form-control mb-2" placeholder="Onde/Como?">
                                        <button type="submit" class="btn btn-primary btn-sm">Salvar</button>
                                    </form>
                                    <div id="listAcomp" class="mt-2 small"></div>
                                </div>
                            </div>
                        </div>

                        <div class="accordion-item">
                            <h2 class="accordion-header"><button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#sec4">4. Última Visita</button></h2>
                            <div id="sec4" class="accordion-collapse collapse" data-bs-parent="#accAnamnese">
                                <div class="accordion-body">
                                    <form id="formVisita">
                                        <input type="hidden" id="visitaId">
                                        <input type="text" id="servicoProcurado" class="form-control mb-2" placeholder="Qual serviço foi procurado?">
                                        <textarea id="motivoVisita" class="form-control mb-2" placeholder="Motivo"></textarea>
                                        <button type="submit" class="btn btn-primary btn-sm">Registrar Visita</button>
                                    </form>
                                    <div id="listVisitas" class="mt-2 small"></div>
                                </div>
                            </div>
                        </div>

                        <div class="accordion-item">
                            <h2 class="accordion-header"><button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#sec5">5. Intervenções Cirúrgicas</button></h2>
                            <div id="sec5" class="accordion-collapse collapse" data-bs-parent="#accAnamnese">
                                <div class="accordion-body">
                                    <form id="formCirurgia">
                                        <input type="hidden" id="cirurgiaId">
                                        <input type="text" id="txtCirurgia" class="form-control mb-2" placeholder="Qual cirurgia?">
                                        <input type="text" id="motivoCirurgia" class="form-control mb-2" placeholder="Motivo">
                                        <button type="submit" class="btn btn-primary btn-sm">Salvar Cirurgia</button>
                                    </form>
                                    <div id="listCirurgias" class="mt-2 small"></div>
                                </div>
                            </div>
                        </div>

                        <div class="accordion-item">
                            <h2 class="accordion-header"><button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#sec6">6. Tabagismo</button></h2>
                            <div id="sec6" class="accordion-collapse collapse" data-bs-parent="#accAnamnese">
                                <div class="accordion-body">
                                    <form id="formTabagismo">
                                        <input type="hidden" id="tabagismoId">
                                        <label class="small">É fumante?</label>
                                        <select id="selFumante" class="form-select mb-2">
                                            <option value="Never smoked">Nunca fumou</option>
                                            <option value="Current smoker">Fumante atual</option>
                                            <option value="Former smoker">Ex-fumante</option>
                                        </select>
                                        <input type="text" id="txtTabagismo" class="form-control mb-2" placeholder="Detalhes (tempo, quantidade)">
                                        <button type="submit" class="btn btn-primary btn-sm">Salvar Tabagismo</button>
                                    </form>
                                    <div id="listTabagismo" class="mt-2 small"></div>
                                </div>
                            </div>
                        </div>

                        <div class="accordion-item">
                            <h2 class="accordion-header"><button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#sec7">7. Etilismo</button></h2>
                            <div id="sec7" class="accordion-collapse collapse" data-bs-parent="#accAnamnese">
                                <div class="accordion-body">
                                    <form id="formEtilismo">
                                        <input type="hidden" id="etilismoId">
                                        <label class="small">Consome álcool?</label>
                                        <select id="selEtilismo" class="form-select mb-2">
                                            <option value="None">Não consome</option>
                                            <option value="Occasional">Ocasional</option>
                                            <option value="Frequent">Frequente</option>
                                        </select>
                                        <input type="text" id="txtEtilismo" class="form-control mb-2" placeholder="Detalhes (tipo, frequência)">
                                        <button type="submit" class="btn btn-primary btn-sm">Salvar Etilismo</button>
                                    </form>
                                    <div id="listEtilismo" class="mt-2 small"></div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalProntuario" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Prontuário FHIR</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <h6>Paciente: <span id="modalPacName"></span> (ID: <span id="modalPacId"></span>)</h6>
                <hr>
                <div id="modalLinks" class="list-group">
                    <a href="#" class="list-group-item list-group-item-action" data-resource="Condition">Queixas Principais</a>
                    <a href="#" class="list-group-item list-group-item-action" data-resource="Encounter" data-params="&class=IMP">Internações</a>
                    <a href="#" class="list-group-item list-group-item-action" data-resource="ServiceRequest">Acompanhamentos</a>
                    <a href="#" class="list-group-item list-group-item-action" data-resource="Encounter" data-params="&class=AMB">Visitas</a>
                    <a href="#" class="list-group-item list-group-item-action" data-resource="Procedure">Cirurgias</a>
                    <a href="#" class="list-group-item list-group-item-action" data-resource="Observation" data-params="&code=72166-2">Tabagismo (LOINC)</a>
                    <a href="#" class="list-group-item list-group-item-action" data-resource="Observation" data-params="&code=74205-6">Etilismo (LOINC)</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
